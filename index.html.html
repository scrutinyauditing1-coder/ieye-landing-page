<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I-EYE Auditing & Management Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #e8ecf1 0%, #d1d8e0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 80px rgba(47, 79, 79, 0.15);
            max-width: 420px;
            width: 100%;
            padding: 50px 35px;
            text-align: center;
            animation: fadeInUp 0.8s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo {
            width: 130px;
            height: auto;
            margin-bottom: 18px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.08));
        }
        h1 {
            color: #2F4F4F;
            font-size: 30px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: 1.5px;
        }
        .tagline {
            color: #1ABC9C;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 3.5px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .sub-tagline {
            color: #7f8c8d;
            font-size: 12px;
            font-weight: 300;
            margin-bottom: 35px;
            letter-spacing: 1px;
        }
        .divider {
            width: 50px;
            height: 3px;
            background: linear-gradient(90deg, #2F4F4F, #1ABC9C);
            margin: 0 auto 35px;
            border-radius: 3px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 17px 22px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        .link-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.4s, height 0.4s;
        }
        .link-btn:hover::after {
            width: 300px;
            height: 300px;
        }
        .link-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 35px rgba(0,0,0,0.12);
        }
        .facebook {
            background: #1877F2;
            color: white;
        }
        .facebook:hover {
            background: #166fe5;
            border-color: #1877F2;
        }
        .instagram {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: white;
        }
        .instagram:hover {
            opacity: 0.95;
            border-color: #dc2743;
        }
        .phone {
            background: #2F4F4F;
            color: white;
        }
        .phone:hover {
            background: #1e3d3d;
            border-color: #2F4F4F;
        }
        .icon {
            font-size: 20px;
            width: 28px;
            text-align: center;
            position: relative;
            z-index: 1;
        }
        .btn-text {
            position: relative;
            z-index: 1;
        }
        .footer {
            margin-top: 40px;
            color: #bdc3c7;
            font-size: 11px;
            font-weight: 300;
            letter-spacing: 0.5px;
        }
        .footer-line {
            width: 30px;
            height: 1px;
            background: #ddd;
            margin: 0 auto 12px;
        }
        @media (max-width: 480px) {
            .container {
                padding: 40px 25px;
                border-radius: 20px;
            }
            h1 {
                font-size: 26px;
            }
            .link-btn {
                padding: 15px 18px;
                font-size: 14px;
            }
        }
    </style>
</head>
